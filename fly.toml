# Fly.io app configuration for Scientia Cognita

app = "scientia-cognita"
primary_region = "bom"

[build]

[deploy]
  release_command = "/app/bin/scientia_cognita eval \"ScientiaCognita.Release.setup()\""

[env]
  PHX_HOST = "scientia-cognita.fly.dev"
  PORT = "4000"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume for SQLite database
# Create before first deploy: fly volumes create scientia_cognita_data --region bom --size 1
[[mounts]]
  source = "scientia_cognita_data"
  destination = "/data"
